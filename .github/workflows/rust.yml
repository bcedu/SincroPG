name: Compilar i Publicar

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag (ex: v1.2.3)"
        required: true
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  clipg-deb:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config fakeroot dpkg-dev \
            libgtk-3-dev libx11-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev \
            libgl1-mesa-dev libglib2.0-0 libasound2-dev

      - name: Build DEB
        run: make deb
        working-directory: ./CliPG

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: deb-clipg
          path: ./CliPG/*.deb

  clipg-rpm:
    runs-on: ubuntu-latest
    container: fedora:latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install deps
        run: |
          dnf install -y git gcc make rpm-build \
            pkgconf-pkg-config gtk3-devel glib2-devel \
            alsa-lib-devel libX11-devel libXrandr-devel \
            libXinerama-devel libXcursor-devel libXi-devel \
            mesa-libGL-devel

      - name: Build RPM
        run: make rpm
        working-directory: ./CliPG

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: rpm-clipg
          path: ./CliPG/build/rpm/RPMS/**/*.rpm

  serpg-bin:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install MUSL tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Build SerPG (static MUSL)
        run: make build
        working-directory: ./SerPG

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: bin-serpg
          path: ./SerPG/target/x86_64-unknown-linux-musl/release/SerPG

  serpg-deb:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install MUSL tools
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config fakeroot dpkg-dev \
            libgtk-3-dev libx11-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev \
            libgl1-mesa-dev libglib2.0-0 libasound2-dev

      - name: Build DEB
        run: make deb
        working-directory: ./SerPG

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: deb-serpg
          path: ./SerPG/*.deb

  release:
    needs: [clipg-deb, clipg-rpm, serpg-bin, serpg-deb]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          files: dist/**/*
