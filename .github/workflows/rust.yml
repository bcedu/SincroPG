name: Build & Release (Static Linux)

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build CliPG (static)
        working-directory: ./CliPG
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Build SerPG (static)
        working-directory: ./SerPG
        run: cargo build --release --target x86_64-unknown-linux-musl

      - name: Create GitHub Release and upload executables
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./CliPG/target/x86_64-unknown-linux-musl/release/CliPG
            ./SerPG/target/x86_64-unknown-linux-musl/release/SerPG
