name: Build & Release (Linux GUI)

on:
  workflow_dispatch:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            fakeroot \
            libgtk-3-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libglib2.0-0 \
            libasound2-dev \
            rpm \
            dpkg-dev

      - name: Build CliPG binary
        working-directory: ./CliPG
        run: cargo build --release

      - name: Build CliPG packages
        working-directory: ./CliPG
        run: |
          make deb

      - name: Build SerPG binary
        working-directory: ./SerPG
        run: cargo build --release

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./CliPG/target/release/CliPG
            ./CliPG/*.deb
            ./CliPG/build/rpm/RPMS/**/*.rpm
            ./SerPG/target/release/SerPG
