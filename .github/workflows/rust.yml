name: Build & Release (Linux GUI)

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (IMPORTANT for egui/winit)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libgl1-mesa-dev \
            libglib2.0-0 \
            libasound2-dev

      - name: Build CliPG (Linux glibc)
        working-directory: ./CliPG
        run: cargo build --release

      - name: Build SerPG (Linux glibc)
        working-directory: ./SerPG
        run: cargo build --release

      - name: Create GitHub Release and upload executables
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./CliPG/target/release/CliPG
            ./SerPG/target/release/SerPG
